<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickHire Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="dashboard-header">
            <div>
                <h1 class="main-title text-gradient">QuickHire Operation Dashboard</h1>
                <p class="subtitle">Recruitment dashboard tracking onboarding, hiring approvals, and candidate pipeline.</p>
            </div>
            <div class="filters" id="filters-container" style="display: none;">
                <select id="agency-filter" class="select-input"><option value="All">All</option></select>
                <select id="state-filter" class="select-input"><option value="All">All</option></select>
            </div>
        </header>

        <div id="upload-section" class="upload-container">
            <label class="upload-label">
                <i class="ri-upload-cloud-2-line upload-icon"></i>
                <span id="upload-text" class="upload-text">Upload Candidate Report (CSV)</span>
                <input type="file" id="csv-upload" accept=".csv" class="hidden-input">
            </label>
        </div>

        <div id="dashboard-content" class="dashboard-content fade-in" style="display: none;">
             <div class="kpi-row">
                 <div class="glass-card join-kpi-card">
                     <div class="card-header text-green">
                         <div style="display: flex; align-items: center; width: 100%; justify-content: space-between;">
                             <div style="display: flex; align-items: center;">
                                 <i class="ri-checkbox-circle-line header-icon"></i>
                                 <h2 style="margin: 0; font-size: 1.25rem;">Employee Joined</h2>
                             </div>
                             <i class="ri-file-download-line export-icon" title="Export" onclick="exportData('joined')"></i>
                         </div>
                     </div>
                     <div class="kpi-grid">
                         <div class="kpi-item">
                             <p class="kpi-label">Yesterday</p>
                             <p id="kpi-yesterday" class="kpi-value">0</p>
                         </div>
                         <div class="kpi-item">
                             <p class="kpi-label">MTD</p>
                             <p id="kpi-mtd" class="kpi-value">0</p>
                         </div>
                         <div class="kpi-item">
                             <p class="kpi-label">WTD</p>
                             <p id="kpi-wtd" class="kpi-value">0</p>
                         </div>
                         <div class="kpi-item border-left padding-left">
                             <p class="kpi-label">Total</p>
                             <p id="kpi-joined-total" class="kpi-value text-green">0</p>
                         </div>
                     </div>
                 </div>
                 
                 <div class="glass-card info-card">
                      <div class="info-content" style="width: 100%; position: relative;">
                          <i class="ri-file-download-line export-icon" title="Export" onclick="exportData('withdrawn')" style="position: absolute; right: 0; top: 0;"></i>
                          <i class="ri-group-line info-icon"></i>
                          <h3 class="info-title">Pending Actions</h3>
                          <p class="info-text">Offer Withdrawn: <span id="kpi-withdrawn" class="bold text-white">0</span></p>
                      </div>
                 </div>
             </div>

             <div class="tables-row">
                <div class="ageing-tables">
                    <div id="ageing-tables-container">
                        <!-- Dynamic -->
                    </div>
                    <div id="cumulative-export-container" style="display: none;">
                        <button onclick="exportData('cumulative')" class="btn-cumulative">
                            <i class="ri-file-download-line"></i> Download Cumulative Pipeline
                        </button>
                    </div>
                </div>
                <div class="summary-tables" id="summary-tables-container">
                    <!-- Dynamic -->
                </div>
             </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
